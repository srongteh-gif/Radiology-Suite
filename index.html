<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#060d18">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RadSuite">
<link rel="manifest" href="manifest.json">
<title>Radiology Decision Suite</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060d18;--card:#080f1e;--border:#0f2035;--border2:#1e3a5f;--text:#e2e8f0;--muted:#4a6080;--muted2:#2d5075}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',system-ui,sans-serif;font-size:14px;min-height:100vh}
/* Update banner */
#updbanner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;background:#082f49;border-top:1px solid #0e7490;padding:10px 16px;align-items:center;justify-content:space-between;gap:12px}
#updbanner span{font-size:12px;color:#bae6fd;display:flex;align-items:center;gap:8px}
#updbanner button{background:#06b6d4;color:#fff;border:none;border-radius:6px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
/* Offline badge */
#offlinebadge{display:none;position:fixed;top:8px;right:8px;z-index:998;background:#1e3a5f;border:1px solid #2d5075;border-radius:6px;padding:4px 10px;font-size:10px;color:#4a6080;font-family:monospace}
/* Header */
.hdr{position:sticky;top:0;z-index:100;background:rgba(6,13,24,0.97);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
.hdr-inner{max-width:640px;margin:0 auto;padding:12px 16px}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.logo{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:monospace;font-weight:700;font-size:10px;flex-shrink:0;transition:all .2s}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:inherit;transition:all .15s}
.subtabs{border-top:1px solid var(--border);padding:6px 16px;display:none}
.subtab-btn{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid var(--border);background:transparent;color:#3a5a7a;font-family:inherit;transition:all .15s}
/* Content */
.content{max-width:640px;margin:0 auto;padding:20px 16px 80px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;transition:color .2s}
.sec-ref{font-size:10px;color:var(--muted2);font-family:monospace}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
.res-card{margin-top:14px;transition:border-color .2s}
.field{margin-bottom:14px}
.field-label{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field-label .unit{text-transform:none;letter-spacing:normal;color:#2d4a65;font-weight:400}
select,input[type=number]{width:100%;background:#131f35;border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;cursor:pointer}
input[type=number]{font-family:monospace}
select:focus,input:focus{border-color:#06b6d4}
.chk-grp{margin-bottom:14px}
.chk-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;cursor:pointer}
.chk-box{width:15px;height:15px;border-radius:4px;border:1px solid #2a4060;background:#0d1b2e;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chk-lbl{font-size:12px;color:#94a3b8;line-height:1.4}
.info-box{background:#0a1525;border:1px solid var(--border2);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:11px;color:var(--muted);line-height:1.6}
.risk-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:1px solid;margin-bottom:16px}
.risk-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.risk-lbl{font-size:10px;font-weight:700;letter-spacing:.12em}
.cat-badge{margin-left:auto;font-size:11px;font-family:monospace;background:#0d1b2e;border:1px solid var(--border2);color:var(--text);padding:2px 8px;border-radius:5px;white-space:nowrap}
.rs{margin-bottom:14px}
.rs-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:5px}
.rec-text{font-size:14px;font-weight:600;color:var(--text);line-height:1.4}
.rat-box{background:#0d1b2e;border:1px solid var(--border2);border-radius:8px;padding:12px 14px}
.rat-text{font-size:12px;color:#94a3b8;line-height:1.6}
.fu-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.fu-dot{width:6px;height:6px;border-radius:50%;background:#06b6d4;flex-shrink:0;margin-top:5px}
.fu-text{font-size:11px;font-family:monospace;color:#94a3b8;line-height:1.5}
.bio-box{background:rgba(30,6,60,.6);border:1px solid #3b0764;border-radius:8px;padding:12px 14px;margin-bottom:14px}
.bio-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#a78bfa;margin-bottom:8px}
.mod-box{background:rgba(40,20,5,.6);border:1px solid #92400e;border-radius:8px;padding:12px 14px;margin-bottom:14px}
.mod-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#f59e0b;margin-bottom:8px}
.note-box{border-left:3px solid #f59e0b;padding:10px 12px;margin-bottom:14px;background:rgba(40,20,0,.4);border-radius:0 6px 6px 0}
.ref-text{font-size:10px;color:var(--muted2);font-family:monospace;border-top:1px solid var(--border);padding-top:10px;margin-bottom:8px}
.disclaimer{background:#070e1c;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:10px;color:var(--muted2);line-height:1.5}
.placeholder{text-align:center;padding:24px 0;color:var(--border2)}
.placeholder-icon{font-size:28px;margin-bottom:8px;opacity:.4}
.placeholder-text{font-size:12px}
.tr-score{background:rgba(6,40,70,.8);border:1px solid #0e4d7a;border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.tr-num{font-family:monospace;font-size:28px;font-weight:700;color:#38bdf8}
.tr-cat{font-size:12px;font-weight:700;color:#38bdf8}
.tr-lbl{font-size:11px;color:#7dd3fc}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .2s ease}
</style>
</head>
<body>

<!-- Update notification (bottom bar) -->
<div id="updbanner">
  <span>⟳ &nbsp;Updated guidelines available</span>
  <button onclick="applyUpdate()">Update now</button>
</div>

<!-- Offline indicator -->
<div id="offlinebadge">● offline</div>

<div class="hdr">
  <div class="hdr-inner">
    <div class="hdr-top">
      <div class="logo" id="logo">Dx</div>
      <div>
        <div style="font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase">Radiology Decision Suite</div>
        <div style="font-size:9px;color:#2d5075;letter-spacing:.05em">Auto-updating · ACR · Fleischner · TI-RADS · LI-RADS · CAD-RADS · Lung-RADS · Kyoto 2024</div>
      </div>
    </div>
    <div class="tabs" id="main-tabs"></div>
  </div>
  <div class="subtabs" id="subtabs">
    <div class="tabs" id="sub-tabs"></div>
  </div>
</div>

<div class="content">
  <div class="sec-hdr">
    <div class="sec-lbl" id="sec-lbl"></div>
    <div class="sec-ref" id="sec-ref"></div>
  </div>
  <div class="card" id="form-card"></div>
  <div class="card res-card fi" id="res-card" style="display:none"></div>
  <div class="placeholder" id="placeholder">
    <div class="placeholder-icon">◈</div>
    <div class="placeholder-text">Complete the fields above — recommendation updates automatically</div>
  </div>
</div>

<script>
// ── STATE
var S={main:'incid',sub:'pulm',inp:{}};
var SECS=[
  {id:'incid',   label:'Incidentaloma',col:'#06b6d4'},
  {id:'birads',  label:'BI-RADS',      col:'#f472b6'},
  {id:'lirads',  label:'LI-RADS',      col:'#f59e0b'},
  {id:'tirads',  label:'TI-RADS',      col:'#34d399'},
  {id:'cadrads', label:'CAD-RADS',     col:'#fb7185'},
  {id:'lungrads',label:'Lung-RADS',    col:'#60a5fa'},
];
var ORGS=[
  {id:'pulm',    label:'Pulmonary', ref:'Fleischner 2017'},
  {id:'adrenal', label:'Adrenal',   ref:'ACR WP 2021'},
  {id:'renal',   label:'Renal',     ref:'Bosniak 2019'},
  {id:'liver',   label:'Liver',     ref:'ACR 2017'},
  {id:'pancreas',label:'Pancreas',  ref:'Kyoto 2024'},
];
var TP={
  composition:{cystic:0,spongiform:0,mixed:1,solid:2},
  echogenicity:{anechoic:0,hyperiso:1,hypo:2,vhypo:3},
  shape:{wider:0,taller:3},
  margin:{smooth:0,lobulated:2,extrathyroidal:3},
  efoci:{none:0,macrocalc:1,peripheral:2,punctate:3}
};
function tCat(s){
  if(s===0)return{cat:'TR2',lbl:'Not Suspicious',fna:1e9,fu_s:1e9};
  if(s<=2) return{cat:'TR3',lbl:'Mildly Suspicious',fna:2.5,fu_s:1.5};
  if(s<=4) return{cat:'TR4',lbl:'Moderately Suspicious',fna:1.5,fu_s:1.0};
  return        {cat:'TR5',lbl:'Highly Suspicious',fna:1.0,fu_s:0.5};
}
var RK={
  low: {bg:'rgba(3,42,25,.8)', bd:'#065f46',dot:'#10b981',lbl:'LOW RISK',          tx:'#6ee7b7'},
  mod: {bg:'rgba(45,22,4,.8)', bd:'#92400e',dot:'#f59e0b',lbl:'MODERATE / REVIEW', tx:'#fcd34d'},
  high:{bg:'rgba(59,7,7,.8)',  bd:'#991b1b',dot:'#ef4444',lbl:'HIGH RISK / ACTION',tx:'#fca5a5'}
};
// ── CALCS
function cPulm(i){
  var sz=parseFloat(i.size);if(!i.type||isNaN(sz))return null;
  var mu=i.multiple==='multi',hi=i.risk==='high',rec,rat,lvl,fu=[],note='';
  if(i.type==='solid'){
    if(!mu){
      if(!hi){if(sz<6){rec='No routine follow-up';rat='Solid <6mm, low-risk.';lvl='low';}else if(sz<=8){rec='CT at 6–12 months; consider 18–24 months';rat='Solid 6–8mm, low-risk.';lvl='mod';fu=['CT thorax: 6–12 months','CT thorax: 18–24 months (optional)'];}else{rec='CT at 3 months; consider PET-CT or tissue sampling';rat='Solid >8mm.';lvl='high';fu=['CT thorax: 3 months','PET-CT','Consider biopsy'];}}
      else{if(sz<6){rec='Optional CT at 12 months';rat='Solid <6mm, high-risk.';lvl='low';fu=['Optional CT thorax: 12 months'];}else if(sz<=8){rec='CT at 6–12 months, then 18–24 months';rat='Solid 6–8mm, high-risk.';lvl='mod';fu=['CT thorax: 6–12 months','CT thorax: 18–24 months'];}else{rec='CT at 3 months; consider PET-CT or tissue sampling';rat='Solid >8mm, high-risk.';lvl='high';fu=['CT thorax: 3 months','PET-CT or tissue sampling'];}}}
    else{
      if(!hi){if(sz<6){rec='No routine follow-up';rat='Multiple solid <6mm, low-risk.';lvl='low';}else{rec='CT at 3–6 months; consider 18–24 months';rat='Multiple solid ≥6mm.';lvl='mod';fu=['CT thorax: 3–6 months','Consider CT: 18–24 months'];}}
      else{if(sz<6){rec='Optional CT at 12 months';rat='Multiple solid <6mm, high-risk.';lvl='low';fu=['Optional CT thorax: 12 months'];}else{rec='CT at 3–6 months, then 18–24 months';rat='Multiple solid ≥6mm, high-risk.';lvl='mod';fu=['CT thorax: 3–6 months','CT thorax: 18–24 months'];}}}
  }else if(i.type==='ggo'){
    note='New GGO: consider short-interval CT (1–3 months) to exclude infection/inflammation.';
    if(!mu){if(sz<6){rec='No routine follow-up';rat='Pure GGO <6mm.';lvl='low';}else{rec='CT at 6–12 months; if persistent, CT every 2 years × 5y';rat='Pure GGO ≥6mm.';lvl='mod';fu=['CT thorax: 6–12 months','CT at 2 years','CT at 4 years','CT at 5 years'];}}
    else{if(sz<6){rec='CT at 3–5 years';rat='Multiple GGOs <6mm.';lvl='low';fu=['CT thorax: 3–5 years'];}else{rec='CT at 3–6 months; CT every 2 years × 5y';rat='Multiple GGOs ≥6mm.';lvl='mod';fu=['CT thorax: 3–6 months','CT every 2 years × 5 years'];}}}
  else if(i.type==='partsolid'){
    var sc2=parseFloat(i.solidComp);
    note='New part-solid: short-interval CT (1–3 months) to exclude infection.';
    if(!mu){if(sz<6){rec='No routine follow-up';rat='Part-solid <6mm.';lvl='low';}else if(isNaN(sc2)||sc2<6){rec='CT at 3–6 months; if persistent, annual CT × 5y';rat='Part-solid ≥6mm, solid component <6mm.';lvl='mod';fu=['CT thorax: 3–6 months','Annual CT × 5 years'];}else{rec='CT at 3–6 months; consider PET-CT or tissue sampling';rat='Part-solid with solid component ≥6mm.';lvl='high';fu=['CT thorax: 3–6 months','PET-CT','Tissue sampling'];}}
    else{if(sz<6){rec='CT at 3–5 years';rat='Multiple part-solid <6mm.';lvl='low';fu=['CT thorax: 3–5 years'];}else if(isNaN(sc2)||sc2<6){rec='CT at 3–6 months; annual CT if persistent';rat='Multiple part-solid ≥6mm, <6mm solid.';lvl='mod';fu=['CT thorax: 3–6 months','Annual CT × 5 years'];}else{rec='CT at 3–6 months; consider PET-CT';rat='Multiple part-solid, solid ≥6mm.';lvl='high';fu=['CT thorax: 3–6 months','PET-CT or tissue sampling'];}}}
  return{rec:rec,rat:rat,lvl:lvl,fu:fu,note:note,ref:'Fleischner Society 2017 — Radiology 284:228–243'};
}
function cAdrenal(i){
  var REF='ACR Incidental Adrenal Mass WP — JACR 2017;14(8):1038';
  var bio=[
    '1mg overnight dexamethasone suppression test (autonomous cortisol secretion)',
    'Plasma free metanephrines or 24h urine metanephrines (phaeochromocytoma)',
    'Aldosterone : renin ratio if hypertensive (hyperaldosteronism)'
  ];
  // ── DIAGNOSTIC BENIGN FEATURES ──────────────────────────────────────────
  var bf=i.benignFeature;
  if(bf&&bf!=='none'){
    var bmap={
      myelolipoma:   {rec:'Myelolipoma — no imaging follow-up',                    rat:'Macroscopic fat is diagnostic of myelolipoma. Definitively benign. Biochemical workup still required.'},
      noEnhancement: {rec:'No enhancement — cyst or haemorrhage, no follow-up',    rat:'Absent enhancement on paired pre- and post-contrast CT = cyst or haemorrhage. Definitively benign.'},
      calcification: {rec:'Benign calcification — no imaging follow-up',            rat:'Benign-appearing calcification without soft-tissue component. Definitively benign.'},
      tenHU:         {rec:'Lipid-rich adenoma (≤10 HU NCCT) — no imaging follow-up', rat:'≤10 HU on unenhanced CT confirms lipid-rich adenoma by density criteria. Definitively benign. Biochemical workup still required.'},
      csMRI:         {rec:'Adenoma on chemical shift MRI — no imaging follow-up',   rat:'Signal dropout on out-of-phase sequence confirms intracellular lipid = adenoma. Definitively benign. Biochemical workup still required.'},
    };
    var bm=bmap[bf]; if(!bm)return null;
    return{rec:bm.rec,rat:bm.rat,lvl:'low',fu:[],bio:bio,ref:REF};
  }
  // ── INDETERMINATE ────────────────────────────────────────────────────────
  if(!bf||!i.sizeRange) return null;
  if(!i.cancerHx) return null;
  var cancer=i.cancerHx==='yes';
  var sz1to2=i.sizeRange==='1to2', sz2to4=i.sizeRange==='2to4', szGe4=i.sizeRange==='ge4';
  // ≥4cm
  if(szGe4){
    if(cancer) return{rec:'≥4cm with cancer history — consider biopsy or PET-CT; exclude phaeochromocytoma first',rat:'≥4cm indeterminate adrenal mass with cancer history: adrenal metastasis must be excluded. Biochemical exclusion of phaeochromocytoma mandatory before biopsy.',lvl:'high',fu:['Biochemical exclusion of phaeochromocytoma before biopsy','PET-CT or adrenal protocol CT','Image-guided biopsy once phaeochromocytoma excluded','MDT (endocrinology + oncology)'],bio:bio,ref:REF};
    return{rec:'≥4cm, no cancer history — consider surgical resection; exclude phaeochromocytoma first',rat:'≥4cm indeterminate adrenal mass without cancer history: risk of adrenocortical carcinoma warrants surgical consideration per ACR 2017. Biochemical workup required before surgery.',lvl:'high',fu:['Complete biochemical workup (phaeochromocytoma exclusion essential before surgery)','Endocrine surgery / MDT referral','Adrenal protocol CT if not already performed'],bio:bio,ref:REF};
  }
  // 1–<4cm: need prior imaging answer
  if(!i.priorImaging) return null;
  if(i.priorImaging==='stable') return{rec:'Stable ≥1 year on prior imaging — benign, no imaging follow-up',rat:'An adrenal mass stable on prior imaging for ≥1 year is considered benign per ACR 2017. No further imaging follow-up required. Biochemical workup still required.',lvl:'low',fu:[],bio:bio,ref:REF};
  if(i.priorImaging==='enlarging'){
    if(cancer) return{rec:'New or enlarging with cancer history — consider biopsy or PET-CT',rat:'Growth on prior imaging with cancer history: concern for adrenal metastasis. Exclude phaeochromocytoma before biopsy.',lvl:'high',fu:['Biochemical exclusion of phaeochromocytoma before biopsy','PET-CT or image-guided biopsy','MDT (endocrinology + oncology)'],bio:bio,ref:REF};
    return{rec:'New or enlarging, no cancer history — consider follow-up adrenal CT or resection',rat:'Growth on prior imaging raises concern for malignancy. Options: adrenal protocol CT at shorter interval or surgical resection, guided by biochemical results and clinical context.',lvl:'high',fu:['Complete biochemical workup','Consider adrenal protocol CT or surgical referral','MDT (endocrinology + surgery)'],bio:bio,ref:REF};
  }
  // No prior imaging
  if(sz1to2&&!cancer) return{rec:'1–2cm, no prior imaging — probably benign; consider 12-month follow-up adrenal CT',rat:'1–2cm indeterminate adrenal mass without prior imaging: probably benign per ACR 2017. Consider 12-month follow-up adrenal CT (or chemical shift MRI). Biochemical workup required.',lvl:'mod',fu:['Complete biochemical workup','Follow-up adrenal protocol CT at 12 months','OR: Chemical shift MRI as alternative'],bio:bio,ref:REF};
  // >2–<4cm (or 1–2cm with cancer Hx), no prior imaging → adrenal protocol CT pathway
  if(!i.ncctResult) return null;
  if(i.ncctResult==='notDone') return{rec:(sz1to2?'1–2cm with cancer history':'2–4cm')+', no prior imaging — adrenal protocol CT required',rat:'Indeterminate adrenal mass requiring characterisation. Adrenal protocol CT (unenhanced + portal venous + 15-min delayed) provides NCCT HU and washout data in a single study.',lvl:'mod',fu:['Adrenal protocol CT (unenhanced + 60s portal venous + 15-min delayed)','OR: Chemical shift MRI as alternative','Complete biochemical workup'],bio:bio,ref:REF};
  if(i.ncctResult==='le10') return{rec:'Lipid-rich adenoma (NCCT ≤10 HU) — no imaging follow-up',rat:'NCCT ≤10 HU confirms lipid-rich adenoma by density criteria. Definitively benign. Biochemical workup still required.',lvl:'low',fu:[],bio:bio,ref:REF};
  // NCCT >10 HU — need washout
  if(!i.washout||i.washout==='notDone') return{rec:'NCCT >10 HU — adrenal washout CT required',rat:'NCCT >10 HU: lipid-rich adenoma not confirmed by density alone. Adrenal washout CT (15-min delayed phase) required to calculate APW and RPW.',lvl:'mod',fu:['Adrenal washout CT — 15-min delayed phase','APW = (HU_enh − HU_del) ÷ (HU_enh − HU_pre) × 100  →  ≥60% = adenoma','RPW = (HU_enh − HU_del) ÷ HU_enh × 100  →  ≥40% = adenoma','Complete biochemical workup'],bio:bio,ref:REF};
  if(i.washout==='noEnhancement') return{rec:'No enhancement on washout CT — cyst or haemorrhage, no follow-up',rat:'Absent enhancement (<10 HU) on washout CT = cyst or haemorrhage. Definitively benign.',lvl:'low',fu:[],bio:bio,ref:REF};
  if(i.washout==='positive') return{rec:'Adenoma confirmed (APW ≥60% or RPW ≥40%) — no imaging follow-up',rat:'Washout criteria met: lipid-poor adenoma confirmed. Definitively benign. Biochemical workup still required.',lvl:'low',fu:[],bio:bio,ref:REF};
  if(i.washout==='negative') return{rec:'Indeterminate washout (APW <60% and RPW <40%) — MDT; imaging F/U, biopsy, PET-CT, or resection per clinical scenario',rat:'Washout criteria not met: adenoma not confirmed. Management guided by clinical context. Phaeochromocytoma must be excluded before biopsy or resection.',lvl:'high',fu:['Biochemical exclusion of phaeochromocytoma before biopsy or resection','MDT (endocrinology + surgery)','Options: imaging follow-up, image-guided biopsy, PET-CT, or surgical resection'],bio:bio,ref:REF};
  return null;
}
function cRenal(i){
  if(!i.bosniak)return null;
  var rm={I:'<1%',II:'<1%',IIF:'~5%',III:'40–60%',IV:'>85%'};
  var d={I:{rec:'Simple cyst — no follow-up',rat:'Bosniak I: hairline wall, no septa/Ca²⁺/enhancement.',lvl:'low',fu:[]},II:{rec:'Minimally complex — no follow-up',rat:'Bosniak II: ≤2 thin smooth septa, fine Ca²⁺. Benign.',lvl:'low',fu:[]},IIF:{rec:'Surveillance MRI/CT: 6 months → annually × 5 years',rat:'Bosniak IIF: ~5% malignancy.',lvl:'mod',fu:['MRI/CT: 6 months','12 months','24 months','36 months','48 months','60 months (discharge)']},III:{rec:'Urological referral — surgery or active surveillance',rat:'Bosniak III: 40–60% malignancy.',lvl:'high',fu:['Urology referral','Nephron-sparing surgery if feasible','MDT discussion']},IV:{rec:'Urgent urological referral — surgical resection',rat:'Bosniak IV: >85% malignancy.',lvl:'high',fu:['Urgent urology referral','Nephron-sparing surgery if feasible']}};
  var r=d[i.bosniak];
  return{rec:r.rec,rat:r.rat,lvl:r.lvl,fu:r.fu,malignancyRisk:rm[i.bosniak],ref:'ACR Bosniak v2019 — Radiology 292(2):475'};
}
function cLiver(i){
  if(!i.risk) return null;
  var REF='ACR Incidental Liver Lesions WP — JACR 2017;14(11):1429';
  if(i.risk==='hcc') return {rec:'Use ACR LI-RADS — this algorithm applies to low/moderate-risk patients only',rat:'Cirrhosis, chronic HBV, or prior HCC: apply ACR LI-RADS v2018 for all hepatic observations.',lvl:'mod',fu:['See LI-RADS tab for HCC-risk patients'],ref:'ACR LI-RADS v2018'};
  if(!i.lesion) return null;

  renderResult();
}
// Result-only render — called by number inputs so typing is never interrupted
function renderResult(){
  var tabId=getTabId();
  var sec=SECS.find(function(x){return x.id===S.main;});
  var col=sec?sec.col:'#06b6d4';
  var calc=CALC[tabId];var result=calc?calc(S.inp):null;
  var rc=document.getElementById('res-card'),ph=document.getElementById('placeholder');
  if(result){rc.innerHTML='<div style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#2d5075;margin-bottom:14px">Auto-updated Recommendation</div>'+resultHTML(result);rc.style.display='block';rc.style.borderColor=col+'30';ph.style.display='none';}
  else{rc.style.display='none';ph.style.display='block';}
}
function setMain(id){S.main=id;S.inp={};render();}
function setSub(id){S.sub=id;S.inp={};render();}
function upd(k,v){S.inp[k]=v;renderResult();}          // number inputs: result only, no form re-render
function updSelect(k,v){S.inp[k]=v;render();}           // selects: full re-render (shows/hides conditional fields)
function tog(k,v){var c=S.inp[k]||[],s=c.slice();var idx=s.indexOf(v);if(idx>=0)s.splice(idx,1);else s.push(v);S.inp[k]=s;render();}
render();

// ── SERVICE WORKER + AUTO-UPDATE ─────────────────────────────────────────
var _pending=null;
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(function(reg){
    // Check for update now + every hour + on window focus
    reg.update();
    setInterval(function(){reg.update();},60*60*1000);
    window.addEventListener('focus',function(){reg.update();});
    reg.addEventListener('updatefound',function(){
      var nw=reg.installing;
      nw.addEventListener('statechange',function(){
        if(nw.state==='installed'&&navigator.serviceWorker.controller){
          _pending=nw;
          document.getElementById('updbanner').style.display='flex';
        }
      });
    });
  });
  navigator.serviceWorker.addEventListener('controllerchange',function(){window.location.reload();});
}
function applyUpdate(){if(_pending)_pending.postMessage({action:'skipWaiting'});}

// ── OFFLINE INDICATOR ────────────────────────────────────────────────────
function syncOnline(){document.getElementById('offlinebadge').style.display=navigator.onLine?'none':'block';}
window.addEventListener('online',syncOnline);
window.addEventListener('offline',syncOnline);
syncOnline();
</script>
